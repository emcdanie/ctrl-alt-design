<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#0F1117"/>

  <!-- Top bar -->
  <rect y="0" width="800" height="44" fill="#161822"/>
  <line x1="0" y1="44" x2="800" y2="44" stroke="#2A2D3E" stroke-width="1"/>
  <!-- Guardian icon -->
  <rect x="16" y="8" width="28" height="28" rx="6" fill="url(#iconGrad)"/>
  <text x="30" y="28" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="white" text-anchor="middle">G</text>
  <text x="54" y="27" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#E8E6F0">Guardian</text>
  <text x="120" y="27" font-family="system-ui,sans-serif" font-size="13" fill="#8B8DA3">AI UX Audit Tool</text>
  <!-- Status -->
  <circle cx="740" cy="22" r="4" fill="#10B981"/>
  <text x="750" y="26" font-family="system-ui,sans-serif" font-size="10" fill="#8B8DA3">Connected</text>

  <!-- Sidebar -->
  <rect x="0" y="44" width="240" height="456" fill="#161822"/>
  <line x1="240" y1="44" x2="240" y2="500" stroke="#2A2D3E" stroke-width="1"/>
  <text x="16" y="74" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#8B8DA3" letter-spacing="1">PAGE UNDER AUDIT</text>

  <!-- Mini page preview -->
  <rect x="16" y="86" width="208" height="160" rx="6" fill="white"/>
  <!-- Mini nav -->
  <text x="26" y="102" font-family="system-ui,sans-serif" font-size="7" font-weight="600" fill="#1A1A1A">Home</text>
  <text x="52" y="102" font-family="system-ui,sans-serif" font-size="7" fill="#999">Flights</text>
  <text x="82" y="102" font-family="system-ui,sans-serif" font-size="7" fill="#999">Hotels</text>
  <text x="110" y="102" font-family="system-ui,sans-serif" font-size="7" fill="#999">Rail</text>
  <line x1="26" y1="108" x2="214" y2="108" stroke="#EEE" stroke-width="0.5"/>
  <!-- Mini hero -->
  <rect x="24" y="114" width="192" height="54" rx="4" fill="#F3F4F6"/>
  <text x="32" y="130" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1A1A1A">Book your next trip</text>
  <text x="32" y="141" font-family="system-ui,sans-serif" font-size="7" fill="#6B7280">Search across flights, hotels, rail</text>
  <rect x="32" y="148" width="56" height="14" rx="3" fill="#1A1A1A"/>
  <text x="60" y="158" font-family="system-ui,sans-serif" font-size="6" font-weight="700" fill="white" text-anchor="middle">Search Flights</text>
  <rect x="92" y="148" width="54" height="14" rx="3" fill="#1A1A1A"/>
  <text x="119" y="158" font-family="system-ui,sans-serif" font-size="6" font-weight="700" fill="white" text-anchor="middle">Search Hotels</text>
  <!-- Warning highlight overlay -->
  <rect x="30" y="146" width="120" height="18" rx="3" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
  <!-- Error highlight overlay -->
  <rect x="24" y="112" width="60" height="58" rx="3" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.5"/>
  <!-- Mini cards -->
  <rect x="24" y="176" width="60" height="26" rx="3" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.5"/>
  <rect x="88" y="176" width="60" height="26" rx="3" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.5"/>
  <rect x="152" y="176" width="60" height="26" rx="3" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.5"/>
  <text x="34" y="192" font-family="system-ui,sans-serif" font-size="6" fill="#6B7280">Recent</text>
  <text x="98" y="192" font-family="system-ui,sans-serif" font-size="6" fill="#6B7280">Saved</text>
  <text x="162" y="192" font-family="system-ui,sans-serif" font-size="6" fill="#6B7280">Pending</text>

  <!-- Scope badges -->
  <text x="16" y="270" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#8B8DA3" letter-spacing="1">AUDIT SCOPE</text>
  <rect x="16" y="278" width="64" height="18" rx="4" fill="rgba(99,102,241,0.12)"/>
  <text x="48" y="290" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="#818CF8" text-anchor="middle">UX Heuristics</text>
  <rect x="84" y="278" width="60" height="18" rx="4" fill="rgba(13,148,136,0.15)"/>
  <text x="114" y="290" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="#5EEAD4" text-anchor="middle">System Drift</text>
  <rect x="148" y="278" width="62" height="18" rx="4" fill="rgba(245,158,11,0.12)"/>
  <text x="179" y="290" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="#FBBF24" text-anchor="middle">Accessibility</text>

  <!-- Selector bar -->
  <rect x="240" y="44" width="560" height="44" fill="#1C1F2E"/>
  <line x1="240" y1="88" x2="800" y2="88" stroke="#2A2D3E" stroke-width="1"/>
  <rect x="256" y="54" width="340" height="24" rx="5" fill="#0F1117" stroke="#2A2D3E" stroke-width="1"/>
  <text x="270" y="70" font-family="monospace" font-size="10" fill="#0D9488">body &gt; main</text>
  <rect x="608" y="54" width="76" height="24" rx="5" fill="url(#btnGrad)"/>
  <text x="646" y="70" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">Run Audit</text>

  <!-- Score cards -->
  <rect x="260" y="100" width="120" height="64" rx="8" fill="#161822" stroke="#2A2D3E" stroke-width="1"/>
  <text x="320" y="118" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#8B8DA3" text-anchor="middle" letter-spacing="0.5">OVERALL</text>
  <text x="320" y="146" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#F59E0B" text-anchor="middle">54</text>
  <text x="320" y="158" font-family="system-ui,sans-serif" font-size="10" fill="#8B8DA3" text-anchor="middle">/ 100</text>

  <rect x="390" y="100" width="120" height="64" rx="8" fill="#161822" stroke="#2A2D3E" stroke-width="1"/>
  <text x="450" y="118" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#8B8DA3" text-anchor="middle" letter-spacing="0.5">ERRORS</text>
  <text x="450" y="146" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#EF4444" text-anchor="middle">2</text>
  <text x="450" y="158" font-family="system-ui,sans-serif" font-size="10" fill="#8B8DA3" text-anchor="middle">critical</text>

  <rect x="520" y="100" width="120" height="64" rx="8" fill="#161822" stroke="#2A2D3E" stroke-width="1"/>
  <text x="580" y="118" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#8B8DA3" text-anchor="middle" letter-spacing="0.5">WARNINGS</text>
  <text x="580" y="146" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#F59E0B" text-anchor="middle">3</text>
  <text x="580" y="158" font-family="system-ui,sans-serif" font-size="10" fill="#8B8DA3" text-anchor="middle">should fix</text>

  <rect x="650" y="100" width="120" height="64" rx="8" fill="#161822" stroke="#2A2D3E" stroke-width="1"/>
  <text x="710" y="118" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#8B8DA3" text-anchor="middle" letter-spacing="0.5">INFO</text>
  <text x="710" y="146" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#6366F1" text-anchor="middle">2</text>
  <text x="710" y="158" font-family="system-ui,sans-serif" font-size="10" fill="#8B8DA3" text-anchor="middle">suggestions</text>

  <!-- Finding 1 -->
  <rect x="260" y="180" width="510" height="80" rx="8" fill="#161822" stroke="#2A2D3E" stroke-width="1"/>
  <circle cx="276" cy="198" r="5" fill="#F59E0B"/>
  <text x="288" y="202" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#E8E6F0">Navigation density high</text>
  <rect x="700" y="190" width="56" height="16" rx="3" fill="rgba(99,102,241,0.12)"/>
  <text x="728" y="201" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#818CF8" text-anchor="middle">UX HEURISTIC</text>
  <text x="276" y="220" font-family="system-ui,sans-serif" font-size="10" fill="#8B8DA3">Primary navigation contains 9 items. Optimal cognitive load: 5–7 items.</text>
  <rect x="276" y="230" width="478" height="20" rx="4" fill="#0F1117" stroke="#2A2D3E" stroke-width="0.5"/>
  <text x="284" y="243" font-family="monospace" font-size="9" fill="#0D9488">nav.primary</text>
  <text x="370" y="243" font-family="monospace" font-size="9" fill="#6B7280">// 9 children found</text>

  <!-- Finding 2 -->
  <rect x="260" y="270" width="510" height="80" rx="8" fill="#161822" stroke="#2A2D3E" stroke-width="1"/>
  <circle cx="276" cy="288" r="5" fill="#EF4444"/>
  <text x="288" y="292" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#E8E6F0">CTA conflict — competing primary actions</text>
  <rect x="710" y="280" width="46" height="16" rx="3" fill="rgba(239,68,68,0.12)"/>
  <text x="733" y="291" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#FCA5A5" text-anchor="middle">PRODUCT</text>
  <text x="276" y="310" font-family="system-ui,sans-serif" font-size="10" fill="#8B8DA3">Two primary-styled buttons create decision hesitation and reduce click-through.</text>
  <rect x="276" y="320" width="478" height="20" rx="4" fill="rgba(13,148,136,0.15)"/>
  <text x="284" y="333" font-family="system-ui,sans-serif" font-size="9" fill="#0D9488" font-weight="600">Suggestion:</text>
  <text x="348" y="333" font-family="system-ui,sans-serif" font-size="9" fill="#E8E6F0">Make one CTA primary, demote other to secondary.</text>

  <!-- Finding 3 (partial) -->
  <rect x="260" y="360" width="510" height="60" rx="8" fill="#161822" stroke="#2A2D3E" stroke-width="1"/>
  <circle cx="276" cy="378" r="5" fill="#0D9488"/>
  <text x="288" y="382" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#E8E6F0">Button spacing deviates from design token</text>
  <rect x="688" y="370" width="68" height="16" rx="3" fill="rgba(13,148,136,0.15)"/>
  <text x="722" y="381" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#5EEAD4" text-anchor="middle">SYSTEM DRIFT</text>
  <text x="276" y="400" font-family="system-ui,sans-serif" font-size="10" fill="#8B8DA3">Hero CTA buttons use 14px padding — system token specifies 16px.</text>

  <!-- Finding 4 (fading out) -->
  <rect x="260" y="430" width="510" height="50" rx="8" fill="#161822" stroke="#2A2D3E" stroke-width="1" opacity="0.5"/>
  <circle cx="276" cy="448" r="5" fill="#6366F1" opacity="0.5"/>
  <text x="288" y="452" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#E8E6F0" opacity="0.5">Hero section lacks landmark role</text>

  <!-- FigPal mascot -->
  <circle cx="760" cy="460" r="20" fill="url(#iconGrad)"/>
  <circle cx="753" cy="458" r="4" fill="white"/>
  <circle cx="767" cy="458" r="4" fill="white"/>

  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
</svg>