<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for visual depth -->
    <linearGradient id="tokenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="subtleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F0E8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#subtleGlow)"/>

  <!-- ========== LEFT SECTION: BEFORE (CHAOS) ========== -->

  <!-- Section background divider suggestion -->
  <line x1="800" y1="0" x2="800" y2="900" stroke="#E8DED2" stroke-width="1" opacity="0.5"/>

  <!-- "BEFORE" Label -->
  <text x="250" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#2C2C2C" letter-spacing="2" opacity="0.7">
    BEFORE
  </text>

  <!-- Button variations - scattered, mismatched -->
  <!-- Button 1: Warm gray, medium radius -->
  <rect x="150" y="180" width="110" height="44" rx="6" fill="#A89A8A" opacity="0.8"/>
  <text x="205" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FAFAF8" text-anchor="middle">Button</text>

  <!-- Button 2: Dull orange, sharp corners -->
  <rect x="280" y="150" width="95" height="40" rx="2" fill="#C9915E" opacity="0.75"/>
  <text x="327" y="177" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FAFAF8" text-anchor="middle">Btn</text>

  <!-- Button 3: Mismatched teal, small, rounded -->
  <rect x="420" y="210" width="75" height="36" rx="18" fill="#5BA99F" opacity="0.7"/>

  <!-- Button 4: Gray, rotated 8deg -->
  <g transform="translate(200, 280) rotate(8)">
    <rect width="105" height="45" rx="8" fill="#9D8F7F" opacity="0.8"/>
    <text x="52" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FAFAF8" text-anchor="middle">Select</text>
  </g>

  <!-- Button 5: Warm tan, overlapping -->
  <rect x="340" y="290" width="120" height="42" rx="4" fill="#B8A89A" opacity="0.75"/>
  <text x="400" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FAFAF8" text-anchor="middle">Action</text>

  <!-- Button 6: Dull teal, different size -->
  <rect x="120" y="360" width="88" height="38" rx="10" fill="#6BA89F" opacity="0.7"/>

  <!-- Button 7: Warm beige, tall -->
  <rect x="280" y="350" width="98" height="52" rx="5" fill="#D4C5B2" opacity="0.8"/>
  <text x="329" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4A4A4A" text-anchor="middle">Press</text>

  <!-- Button 8: Gray-green, rotated -6deg -->
  <g transform="translate(450, 330) rotate(-6)">
    <rect width="100" height="40" rx="12" fill="#8B9D93" opacity="0.75"/>
  </g>

  <!-- Button 9: Dark orange variant -->
  <rect x="170" y="470" width="115" height="46" rx="3" fill="#BE8A52" opacity="0.7"/>
  <text x="227" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FAFAF8" text-anchor="middle">Toggle</text>

  <!-- Button 10: Weird teal, small -->
  <rect x="330" y="480" width="65" height="32" rx="6" fill="#7BA89F" opacity="0.65"/>

  <!-- Button 11: Muted gray, medium -->
  <rect x="450" y="460" width="105" height="40" rx="7" fill="#9A8D7D" opacity="0.8"/>

  <!-- Button 12: Tan, rotated 4deg -->
  <g transform="translate(200, 590) rotate(4)">
    <rect width="108" height="44" rx="8" fill="#C5B4A3" opacity="0.75"/>
    <text x="54" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4A4A4A" text-anchor="middle">Save</text>
  </g>

  <!-- Scattered label indicating inconsistency -->
  <text x="200" y="720" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8A8A8A" opacity="0.6">
    17 variations
  </text>
  <text x="190" y="745" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8A8A8A" opacity="0.6">
    No consistency
  </text>

  <!-- ========== CENTER: TRANSITION ARROW ========== -->

  <!-- Arrow line -->
  <line x1="750" y1="450" x2="850" y2="450" stroke="#D4C5B2" stroke-width="3" opacity="0.5"/>

  <!-- Arrow head -->
  <polygon points="850,450 820,435 825,450 820,465" fill="#D4C5B2" opacity="0.5"/>

  <!-- ========== RIGHT SECTION: AFTER (SYSTEM) ========== -->

  <!-- "AFTER" Label -->
  <text x="1250" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#2C2C2C" letter-spacing="2" opacity="0.7">
    AFTER
  </text>

  <!-- Primary Button -->
  <rect x="1050" y="180" width="200" height="50" rx="8" fill="#0D9488"/>
  <text x="1150" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#FAFAF8" text-anchor="middle">Primary</text>

  <!-- Secondary Button -->
  <rect x="1050" y="250" width="200" height="50" rx="8" fill="#14B8A6"/>
  <text x="1150" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#FAFAF8" text-anchor="middle">Secondary</text>

  <!-- Ghost Button -->
  <rect x="1050" y="320" width="200" height="50" rx="8" fill="none" stroke="#0D9488" stroke-width="2"/>
  <text x="1150" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#0D9488" text-anchor="middle">Ghost</text>

  <!-- Outline Button -->
  <rect x="1050" y="390" width="200" height="50" rx="8" fill="#F5F0E8" stroke="#8A8A8A" stroke-width="2"/>
  <text x="1150" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#2C2C2C" text-anchor="middle">Outline</text>

  <!-- ========== TOKEN HIERARCHY ========== -->

  <!-- Title for token section -->
  <text x="1050" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#8A8A8A" letter-spacing="1" opacity="0.8">
    TOKEN HIERARCHY
  </text>

  <!-- Token circles and connections -->
  <!-- Primitive circle -->
  <circle cx="1100" cy="590" r="22" fill="#D4C5B2" opacity="0.7"/>
  <text x="1100" y="598" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#2C2C2C" text-anchor="middle">
    Primitive
  </text>

  <!-- Connection line 1 -->
  <line x1="1122" y1="590" x2="1178" y2="590" stroke="#D4C5B2" stroke-width="2" opacity="0.6"/>

  <!-- Semantic circle -->
  <circle cx="1200" cy="590" r="22" fill="#14B8A6" opacity="0.8"/>
  <text x="1200" y="598" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#FAFAF8" text-anchor="middle">
    Semantic
  </text>

  <!-- Connection line 2 -->
  <line x1="1222" y1="590" x2="1278" y2="590" stroke="#14B8A6" stroke-width="2" opacity="0.6"/>

  <!-- Component circle -->
  <circle cx="1300" cy="590" r="22" fill="#0D9488"/>
  <text x="1300" y="598" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#FAFAF8" text-anchor="middle">
    Component
  </text>

  <!-- ========== BOTTOM DESCRIPTIVE TEXT ========== -->

  <!-- Consistency statement -->
  <text x="1050" y="720" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8A8A8A" opacity="0.8">
    Unified design system
  </text>
  <text x="1050" y="745" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8A8A8A" opacity="0.8">
    Token-based foundation
  </text>

  <!-- ========== BOTTOM CENTER: TRANSFORMATION MESSAGE ========== -->

  <!-- Subtle message -->
  <text x="800" y="820" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8A8A8A" text-anchor="middle" opacity="0.7" font-weight="500">
    From drift to foundation: A design system transformation
  </text>
</svg>