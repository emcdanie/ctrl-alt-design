<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design System Maturity Assessment</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #FAFAF8;
    color: #1A1A1A;
    padding: 40px 32px;
    min-height: 100vh;
  }

  .header {
    margin-bottom: 28px;
  }

  .header .label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #0D9488;
    margin-bottom: 6px;
  }

  .header h1 {
    font-size: clamp(18px, 2.5vw, 24px);
    font-weight: 600;
    color: #1A1A1A;
    line-height: 1.3;
  }

  .header p {
    font-size: 13px;
    color: #6B6B6B;
    margin-top: 6px;
    max-width: 560px;
    line-height: 1.6;
  }

  /* Toggle */
  .toggle-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .toggle-btn {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #E8E4DD;
    background: white;
    color: #6B6B6B;
    cursor: pointer;
    transition: all 0.2s;
  }

  .toggle-btn.active {
    background: #0D9488;
    color: white;
    border-color: #0D9488;
  }

  .toggle-btn:hover:not(.active) {
    border-color: #0D9488;
    color: #0D9488;
  }

  /* Category groups */
  .category-group {
    margin-bottom: 28px;
  }

  .group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .group-icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: white;
  }

  .group-icon.foundation { background: #0D9488; }
  .group-icon.growth { background: #7C3AED; }
  .group-icon.roi { background: #D97706; }

  .group-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #999;
  }

  /* Scale rows */
  .scale-rows {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .scale-row {
    background: white;
    border: 1px solid #E8E4DD;
    border-radius: 10px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 160px 1fr 48px;
    align-items: center;
    gap: 16px;
    transition: border-color 0.2s;
  }

  .scale-row:hover {
    border-color: #CCC;
  }

  @media (max-width: 560px) {
    .scale-row {
      grid-template-columns: 1fr;
      gap: 8px;
    }
  }

  .scale-name {
    font-size: 13px;
    font-weight: 600;
    color: #1A1A1A;
  }

  /* 5-step scale */
  .scale-track {
    display: flex;
    gap: 4px;
    height: 10px;
  }

  .scale-step {
    flex: 1;
    height: 100%;
    border-radius: 3px;
    background: #F0EDE8;
    transition: background 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .scale-step.filled.low { background: #FCA5A5; }
  .scale-step.filled.mid { background: #FCD34D; }
  .scale-step.filled.high { background: #5EEAD4; }
  .scale-step.filled.full { background: #0D9488; }

  .scale-score {
    font-size: 14px;
    font-weight: 700;
    color: #1A1A1A;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* Overall strip */
  .overall-strip {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px 24px;
    background: #F5F0E8;
    border-radius: 10px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .overall-big {
    font-size: 36px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1;
  }

  .overall-meta {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #999;
  }

  .divider {
    width: 1px;
    height: 36px;
    background: #D4C5B2;
  }

  .group-scores {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .group-score-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .group-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .group-dot.foundation { background: #0D9488; }
  .group-dot.growth { background: #7C3AED; }
  .group-dot.roi { background: #D97706; }

  .group-score-label {
    font-size: 12px;
    color: #6B6B6B;
  }

  .group-score-val {
    font-size: 13px;
    font-weight: 700;
    color: #1A1A1A;
  }
</style>
</head>
<body>

<div class="header">
  <div class="label">Maturity Assessment</div>
  <h1>Design System Maturity &mdash; 9 Dimensions</h1>
  <p>Scoring the system across Foundation, Growth, and ROI to track progress from fragmentation to shared infrastructure.</p>
</div>

<div class="toggle-row">
  <button class="toggle-btn active" onclick="showState('before')">Before</button>
  <button class="toggle-btn" onclick="showState('after')">After</button>
</div>

<div id="content"></div>
<div class="overall-strip" id="overall"></div>

<script>
const groups = [
  {
    name: "Foundation",
    icon: "F",
    cssClass: "foundation",
    dimensions: [
      { name: "Design Tokens", before: 1, after: 4 },
      { name: "Component Library", before: 2, after: 4 },
      { name: "Documentation", before: 1, after: 4 }
    ]
  },
  {
    name: "Growth",
    icon: "G",
    cssClass: "growth",
    dimensions: [
      { name: "Interoperability", before: 1, after: 3 },
      { name: "Innovation", before: 2, after: 3 },
      { name: "Quality Assurance", before: 1, after: 4 }
    ]
  },
  {
    name: "ROI",
    icon: "R",
    cssClass: "roi",
    dimensions: [
      { name: "Governance", before: 0, after: 4 },
      { name: "Adoption", before: 1, after: 3 },
      { name: "Culture", before: 1, after: 3 }
    ]
  }
];

let currentState = "before";

function getStepClass(stepIdx, score) {
  if (stepIdx >= score) return "";
  if (score <= 1) return "filled low";
  if (score <= 2) return "filled mid";
  if (score <= 3) return "filled high";
  return "filled full";
}

function render(state) {
  const container = document.getElementById("content");
  container.innerHTML = "";

  let totalAll = 0;
  let countAll = 0;
  const groupAvgs = [];

  groups.forEach(group => {
    const el = document.createElement("div");
    el.className = "category-group";

    let groupTotal = 0;

    let html = `
      <div class="group-header">
        <div class="group-icon ${group.cssClass}">${group.icon}</div>
        <div class="group-title">${group.name}</div>
      </div>
      <div class="scale-rows">
    `;

    group.dimensions.forEach(dim => {
      const score = state === "before" ? dim.before : dim.after;
      groupTotal += score;
      totalAll += score;
      countAll++;

      let steps = "";
      for (let i = 0; i < 5; i++) {
        steps += `<div class="scale-step ${getStepClass(i, score)}"></div>`;
      }

      html += `
        <div class="scale-row">
          <div class="scale-name">${dim.name}</div>
          <div class="scale-track">${steps}</div>
          <div class="scale-score">${score}</div>
        </div>
      `;
    });

    html += `</div>`;
    el.innerHTML = html;
    container.appendChild(el);

    groupAvgs.push({
      name: group.name,
      cssClass: group.cssClass,
      avg: (groupTotal / group.dimensions.length).toFixed(1)
    });
  });

  const overall = (totalAll / countAll).toFixed(1);
  const overallEl = document.getElementById("overall");

  const groupScoresHtml = groupAvgs.map(g => `
    <div class="group-score-item">
      <div class="group-dot ${g.cssClass}"></div>
      <span class="group-score-label">${g.name}</span>
      <span class="group-score-val">${g.avg}</span>
    </div>
  `).join("");

  overallEl.innerHTML = `
    <div>
      <div class="overall-meta">Overall</div>
      <div class="overall-big">${overall}</div>
    </div>
    <div class="divider"></div>
    <div class="group-scores">${groupScoresHtml}</div>
  `;
}

function showState(state) {
  currentState = state;
  document.querySelectorAll(".toggle-btn").forEach(btn => {
    btn.classList.toggle("active", btn.textContent.toLowerCase() === state);
  });
  render(state);
}

render("before");
</script>

</body>
</html>
